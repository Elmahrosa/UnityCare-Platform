version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uch-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - uch-network
    volumes:
      - api-logs:/app/logs

  mongo:
    image: mongo:7
    container_name: uch-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: unity_care_hospital
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - uch-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  website:
    image: nginx:alpine
    container_name: uch-website
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - uch-network

networks:
  uch-network:
    driver: bridge

volumes:
  mongo-data:
  api-logs:
